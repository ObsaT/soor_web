<section class="max-w-3xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold">Contact Us</h1>
  <form [formGroup]="form" (ngSubmit)="send()" class="mt-4 space-y-4">
    <input formControlName="name" placeholder="Full name" class="w-full p-3 rounded-lg border" />
    <input formControlName="email" placeholder="Email" class="w-full p-3 rounded-lg border" />
    <textarea formControlName="message" rows="5" placeholder="Message" class="w-full p-3 rounded-lg border"></textarea>
    <button class="btn-primary" [disabled]="form.invalid">Send Message</button>
  </form>
</section>

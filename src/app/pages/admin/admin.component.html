<div class="space-y-6 max-w-4xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold">Admin Dashboard</h1>


<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="card">
<div class="font-semibold">Total Events</div>
<div class="text-3xl">{{events.length}}</div>
</div>


<div class="card">
<div class="font-semibold">Quick Actions</div>
<div class="mt-3 flex gap-2">
<button class="px-3 py-2 border rounded">Create Event</button>
<button class="px-3 py-2 border rounded">Upload Gallery</button>
</div>
</div>
</div>


<div>
<h2 class="font-semibold">Manage Events</h2>
<div class="grid grid-cols-1 gap-3 mt-3">
<div *ngFor="let e of events" class="card flex items-center justify-between">
<div>
<div class="font-semibold">{{e.title}}</div>
<div class="text-sm text-gray-500">{{e.date | date}} • {{e.location}}</div>
</div>
<div class="flex gap-2">
<button class="px-3 py-1 border rounded">Edit</button>
<button class="px-3 py-1 border rounded text-red-600" (click)="deleteEvent(e.id)">Delete</button>
</div>
</div>
</div>
</div>
</div>

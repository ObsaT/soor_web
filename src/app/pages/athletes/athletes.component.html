<section class="max-w-5xl mx-auto px-4 py-8">
  <div class="justify-between flex">
  <h1 class="text-3xl font-bold">Athletes</h1>
  <input class="border border-gray-300 rounded-md p-2" type="search" name="" id="" (input)="search()" [(ngModel)]="name">
</div>
  <div class="mt-4 grid md:grid-cols-3 gap-6">
    <div *ngFor="let a of athletes" class="card">
      <img [src]="a.photoUrl" alt="{{a.name}}" class="w-full h-44 object-cover rounded-md"/>
      <h3 class="mt-3 font-semibold">{{a.name}}</h3>
      <p class="text-sm text-gray-600">{{a.discipline}} • {{a.country}}</p>
      <p class="text-sm mt-2">{{a.personalBest}}</p>
    </div>
  </div>
</section>

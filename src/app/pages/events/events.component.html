<div class="space-y-6 max-w-5xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">Events</h1>
        <div>
            <select [(ngModel)]="filter" class="border rounded px-3 py-1 p-2" (change)="filterEvents()">
                <option value="all">All</option>
                <option value="marathon">Marathon</option>
                <option value="half">Half</option>
            </select>
        </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <ng-container *ngFor="let e of events; trackBy: trackById">
            <app-event-card [event]="e"></app-event-card>
        </ng-container>
    </div>
</div>

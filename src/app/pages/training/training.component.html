<div class="max-w-5xl mx-auto px-4 py-8 space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">Training Programs</h1>
        <div>
            <select [(ngModel)]="levelFilter" class="border rounded px-3 py-1" (change)="filter()">
                <option value="all">All Levels</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Pro">Pro</option>
            </select>
        </div>
    </div>


    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div *ngFor="let p of programs | slice:0:10" class="card border-2 p-4 rounded border-gray-200">
            <div class="flex justify-between items-start">
                <div>
                    <div class="font-semibold text-lg">{{p.title}}</div>
                    <div class="text-sm text-gray-500">{{p.level}} • {{p.duration}}</div>
                </div>
                <div>
                    <button class="px-3 py-1 rounded border">View</button>
                </div>
            </div>
            <p class="mt-3 text-sm text-gray-600">{{p.description}}</p>
        </div>
    </div>
</div>

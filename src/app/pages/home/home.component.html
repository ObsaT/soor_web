<section class="max-w-5xl mx-auto px-4 py-8">
  <!-- hero -->
  <div class="flex flex-col md:flex-row items-center gap-6">
    <div class="flex-1">
      <h1 class="text-4xl md:text-5xl font-bold leading-tight">Representing Top Athletes</h1>
      <p class="mt-4 text-gray-600 max-w-xl">We connect elite athletes with the best opportunities to maximize their
        potential.</p>
      <div class="mt-6">
        <a routerLink="/contact" class="btn-primary rounded-md">Contact Us</a>
      </div>
    </div>
    <div class="flex-1">
      <div class="card overflow-hidden">
        <img src="assets/hero-run.jpg" alt="hero" class="w-full h-64 object-cover rounded-lg-12" />
      </div>
    </div>
  </div>

  <!-- featured athletes -->
  <h2 class="mt-10 text-2xl font-semibold">Featured Athletes</h2>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mt-4">
    <div *ngFor="let a of athletes" class="card">
      <img [src]="a.photoUrl" alt="{{a.name}}" class="w-full h-40 object-cover rounded-md" />
      <h3 class="mt-3 font-semibold">{{a.name}}</h3>
      <p class="text-sm text-gray-600">{{a.discipline}}</p>
    </div>
  </div>

  <!-- upcoming events -->
  <h2 class="mt-10 text-2xl font-semibold">Upcoming Events</h2>
  <div class="grid md:grid-cols-2 gap-4 mt-4">
    <div *ngFor="let e of events" class="card flex gap-4 items-center">
      <img [src]="e.image" alt="{{e.title}}" class="w-24 h-24 object-cover rounded-md" />
      <div>
        <h4 class="font-semibold">{{e.title}}</h4>
        <p class="text-sm text-gray-600">{{e.location}}</p>
        <p class="text-xs text-gray-500">{{e.date | date:'mediumDate'}}</p>
      </div>
    </div>
  </div>

  <div class="mt-8 text-center">
    <a routerLink="/events" class="text-blue-600 font-semibold">View all events →</a>
  </div>
</section>
<div class="max-w-5xl mx-auto">
  <app-footer></app-footer>
</div>

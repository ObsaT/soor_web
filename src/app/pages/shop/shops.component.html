<div class="space-y-6 max-w-5xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">Shop</h1>
        <div class="text-sm">Cart: {{cart.length}}</div>
    </div>


    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div *ngFor="let p of products" class="card flex flex-col gap-3">
            <div class="h-36 bg-gray-200 rounded">
                <img [src]="p.image" alt="{{p.title}}" class="w-full h-full object-cover rounded"/>
            </div>
            <div class="flex justify-between items-center">
                <div>
                    <div class="font-semibold">{{p.title}}</div>
                    <div class="text-sm text-gray-500">${{p.price}}</div>
                </div>
                <button class="bg-orange-500 text-white px-3 py-1 rounded" (click)="addToCart(p)">Add</button>
            </div>
        </div>
    </div>
</div>

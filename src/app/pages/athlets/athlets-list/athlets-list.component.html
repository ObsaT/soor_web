<section class="max-w-4xl mx-auto p-4">
	<div class="flex justify-between items-center mb-4">
		<h2 class="text-xl font-semibold">Athletes</h2>
		<button class="btn-primary" (click)="add()">Add Athlete</button>
	</div>

	<div class="overflow-x-auto">
		<table class="min-w-full bg-white border">
			<thead>
				<tr class="bg-gray-100 text-left">
					<th class="py-2 px-3">Name</th>
					<th class="py-2 px-3">Discipline</th>
					<th class="py-2 px-3">Country</th>
					<th class="py-2 px-3">Actions</th>
				</tr>
			</thead>
			<tbody>
				<tr *ngFor="let a of athletes" class="border-t">
					<td class="py-2 px-3">{{ a.name }}</td>
					<td class="py-2 px-3">{{ a.discipline }}</td>
					<td class="py-2 px-3">{{ a.country }}</td>
					<td class="py-2 px-3">
						<button class="btn-sm" (click)="edit(a)">Edit</button>
						<button class="btn-sm btn-danger" (click)="remove(a)">Delete</button>
					</td>
				</tr>
				<tr *ngIf="athletes.length === 0"><td class="p-4" colspan="4">No athletes available.</td></tr>
			</tbody>
		</table>
	</div>

	<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
		<div class="bg-white rounded-lg w-full max-w-2xl p-6">
			<app-athlets-form [model]="selected" (submit)="onSubmit($event)" (cancel)="onCancel()"></app-athlets-form>
		</div>
	</div>
</section>
